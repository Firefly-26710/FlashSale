spring.application.name=core-service

spring.config.import=optional:nacos:${spring.application.name}.properties?group=DEFAULT_GROUP&refreshEnabled=true,optional:nacos:flashsale-common.properties?group=DEFAULT_GROUP&refreshEnabled=true
spring.cloud.nacos.server-addr=${NACOS_SERVER_ADDR:localhost:8848}
spring.cloud.nacos.discovery.namespace=${NACOS_NAMESPACE:public}
spring.cloud.nacos.discovery.group=${NACOS_GROUP:DEFAULT_GROUP}
spring.cloud.compatibility-verifier.enabled=false

# 数据库配置
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/FlashSale?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis 配置
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2s

# Elasticsearch 配置
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.connection-timeout=1s
spring.elasticsearch.socket-timeout=2s

# 缓存与限流业务参数已迁移至 Nacos 集中管理（core-service.properties）

flashsale.cache.product-bloom.key=product:bloom
flashsale.cache.product-bloom.expected-insertions=100000
flashsale.cache.product-bloom.false-probability=0.01
flashsale.cache.product-bloom.rebuild-lock-lease-seconds=120

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database=mysql

# 服务器配置
server.port=${SERVER_PORT:6005}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# 动态配置演示（由 Nacos 覆盖）
flashsale.dynamic.message=hello-from-local-core-service

management.endpoints.web.exposure.include=health,info