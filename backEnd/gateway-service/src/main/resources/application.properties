spring.application.name=gateway-service
server.port=${SERVER_PORT:8080}

spring.config.import=optional:nacos:${spring.application.name}.properties?group=DEFAULT_GROUP&refreshEnabled=true,optional:nacos:flashsale-common.properties?group=DEFAULT_GROUP&refreshEnabled=true
spring.cloud.nacos.server-addr=${NACOS_SERVER_ADDR:localhost:8848}
spring.cloud.nacos.discovery.namespace=${NACOS_NAMESPACE:public}
spring.cloud.nacos.discovery.group=${NACOS_GROUP:DEFAULT_GROUP}
spring.cloud.compatibility-verifier.enabled=false

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=order-service-route
spring.cloud.gateway.routes[0].uri=lb://order-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@ipKeyResolver}
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=${flashsale.gateway.ratelimit.order.replenish-rate:12}
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=${flashsale.gateway.ratelimit.order.burst-capacity:24}
spring.cloud.gateway.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.name=orderGatewayCircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.fallbackUri=forward:/fallback/order

spring.cloud.gateway.routes[1].id=core-service-route
spring.cloud.gateway.routes[1].uri=lb://core-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/**
spring.cloud.gateway.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[0].args.key-resolver=#{@ipKeyResolver}
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.replenishRate=${flashsale.gateway.ratelimit.core.replenish-rate:30}
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.burstCapacity=${flashsale.gateway.ratelimit.core.burst-capacity:60}
spring.cloud.gateway.routes[1].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[1].args.name=coreGatewayCircuitBreaker
spring.cloud.gateway.routes[1].filters[1].args.fallbackUri=forward:/fallback/core

resilience4j.circuitbreaker.instances.orderGatewayCircuitBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.orderGatewayCircuitBreaker.sliding-window-size=20
resilience4j.circuitbreaker.instances.orderGatewayCircuitBreaker.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.orderGatewayCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orderGatewayCircuitBreaker.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.orderGatewayCircuitBreaker.permitted-number-of-calls-in-half-open-state=5

resilience4j.circuitbreaker.instances.coreGatewayCircuitBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.coreGatewayCircuitBreaker.sliding-window-size=20
resilience4j.circuitbreaker.instances.coreGatewayCircuitBreaker.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.coreGatewayCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.coreGatewayCircuitBreaker.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.coreGatewayCircuitBreaker.permitted-number-of-calls-in-half-open-state=5

resilience4j.timelimiter.instances.orderGatewayCircuitBreaker.timeout-duration=3s
resilience4j.timelimiter.instances.coreGatewayCircuitBreaker.timeout-duration=3s

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
