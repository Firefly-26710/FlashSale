# 数据库配置
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/FlashSale?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis 配置
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2s

# 商品详情缓存穿透防护配置
flashsale.cache.product-detail.ttl-seconds=600
flashsale.cache.product-detail.null-ttl-seconds=60
flashsale.cache.product-detail.jitter-max-seconds=300
flashsale.cache.product-detail.rebuild-lock-seconds=10
flashsale.cache.product-detail.rebuild-thread-pool-size=4

# 商品列表缓存雪崩防护配置（逻辑过期 + 抖动 + 异步重建）
flashsale.cache.product-list.ttl-seconds=300
flashsale.cache.product-list.jitter-max-seconds=180
flashsale.cache.product-list.rebuild-lock-seconds=8

# 启动预热配置（预热商品详情数量）
flashsale.cache.warmup.product-detail-count=20

# 查询接口限流配置（每秒请求数）
flashsale.ratelimit.product-list.rps=200
flashsale.ratelimit.product-detail.rps=500

flashsale.cache.product-bloom.key=product:bloom
flashsale.cache.product-bloom.expected-insertions=100000
flashsale.cache.product-bloom.false-probability=0.01
flashsale.cache.product-bloom.rebuild-lock-lease-seconds=120

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database=mysql

# 服务器配置
server.port=${SERVER_PORT:6005}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB