services:
  mysql-primary:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: flashsale-mysql-primary
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-FlashSale}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid_mode=ON
      - --enforce_gtid_consistency=ON
      - --log-replica-updates=ON
    ports:
      - "${MYSQL_PRIMARY_PORT:-3306}:3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./backEnd/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mysql/init-primary-users.sql:/docker-entrypoint-initdb.d/init-primary-users.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 12

  mysql-replica:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: flashsale-mysql-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --server-id=2
      - --gtid_mode=ON
      - --enforce_gtid_consistency=ON
      - --relay-log=relay-bin
    ports:
      - "${MYSQL_REPLICA_PORT:-3308}:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 12

  mysql-replica-init:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: flashsale-mysql-replica-init
    restart: "no"
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      PRIMARY_HOST: mysql-primary
      PRIMARY_PORT: 3306
      REPLICA_HOST: mysql-replica
      REPLICA_PORT: 3306
      REPL_USER: repl
      REPL_PASSWORD: repl123
    volumes:
      - ./infra/mysql/init-replication.sh:/init-replication.sh:ro
    command: ["sh", "/init-replication.sh"]

  redis:
    image: ${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7-alpine}
    container_name: flashsale-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  proxysql:
    image: ${PROXYSQL_IMAGE:-proxysql/proxysql:2.6.2}
    container_name: flashsale-proxysql
    restart: unless-stopped
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully
    ports:
      - "${PROXYSQL_PORT:-6033}:6033"
      - "${PROXYSQL_ADMIN_PORT:-6032}:6032"
    volumes:
      - ./infra/proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
      - proxysql_data:/var/lib/proxysql

  backend1:
    build:
      context: ./backEnd
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:21-jre}
    container_name: flashsale-backend-1
    restart: unless-stopped
    depends_on:
      proxysql:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: ${BACKEND_SERVER_PORT:-6005}
      SPRING_DATASOURCE_URL: jdbc:mysql://proxysql:6033/${MYSQL_DATABASE:-FlashSale}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: app_pass
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
    ports:
      - "${BACKEND1_HOST_PORT:-8081}:${BACKEND_SERVER_PORT:-6005}"

  backend2:
    build:
      context: ./backEnd
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:21-jre}
    container_name: flashsale-backend-2
    restart: unless-stopped
    depends_on:
      proxysql:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: ${BACKEND_SERVER_PORT:-6005}
      SPRING_DATASOURCE_URL: jdbc:mysql://proxysql:6033/${MYSQL_DATABASE:-FlashSale}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: app_pass
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
    ports:
      - "${BACKEND2_HOST_PORT:-8082}:${BACKEND_SERVER_PORT:-6005}"

  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: flashsale-frontend
    restart: unless-stopped
    depends_on:
      - backend1
      - backend2
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_primary_data:
  mysql_replica_data:
  proxysql_data:
  redis_data:
