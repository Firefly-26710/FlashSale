services:
  nacos:
    image: ${NACOS_IMAGE:-docker.m.daocloud.io/nacos/nacos-server:v2.3.2}
    container_name: flashsale-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: ${NACOS_JVM_XMS:-256m}
      JVM_XMX: ${NACOS_JVM_XMX:-512m}
      JVM_XMN: ${NACOS_JVM_XMN:-128m}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${NACOS_PORT:-8848}:8848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/v1/console/health/readiness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  nacos-config-init:
    image: ${CURL_IMAGE:-docker.m.daocloud.io/curlimages/curl:8.10.1}
    container_name: flashsale-nacos-config-init
    restart: "no"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
    volumes:
      - ./infra/nacos/config:/nacos-config:ro
      - ./infra/nacos/init-config.sh:/init-config.sh:ro
    entrypoint: ["sh", "/init-config.sh"]

  mysql-primary:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: flashsale-mysql-primary
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-FlashSale}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid_mode=ON
      - --enforce_gtid_consistency=ON
      - --log-replica-updates=ON
    ports:
      - "${MYSQL_PRIMARY_PORT:-3306}:3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./backEnd/core-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mysql/init-primary-users.sql:/docker-entrypoint-initdb.d/init-primary-users.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 12

  mysql-replica:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: flashsale-mysql-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --server-id=2
      - --gtid_mode=ON
      - --enforce_gtid_consistency=ON
      - --relay-log=relay-bin
    ports:
      - "${MYSQL_REPLICA_PORT:-3308}:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 12

  mysql-replica-init:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: flashsale-mysql-replica-init
    restart: "no"
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      PRIMARY_HOST: mysql-primary
      PRIMARY_PORT: 3306
      REPLICA_HOST: mysql-replica
      REPLICA_PORT: 3306
      REPL_USER: repl
      REPL_PASSWORD: repl123
    volumes:
      - ./infra/mysql/init-replication.sh:/init-replication.sh:ro
    command: ["sh", "/init-replication.sh"]

  mysql-inventory:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: flashsale-mysql-inventory
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${INVENTORY_DB_NAME:-FlashSale}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_INVENTORY_PORT:-3310}:3306"
    volumes:
      - mysql_inventory_data:/var/lib/mysql
      - ./infra/mysql/init-inventory.sql:/docker-entrypoint-initdb.d/init-inventory.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: ${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7-alpine}
    container_name: flashsale-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-docker.m.daocloud.io/library/elasticsearch:8.14.3}
    container_name: flashsale-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: ${KAFKA_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/bitnami/kafka:3.7}
    container_name: flashsale-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  proxysql:
    image: ${PROXYSQL_IMAGE:-proxysql/proxysql:2.6.2}
    container_name: flashsale-proxysql
    restart: unless-stopped
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully
    ports:
      - "${PROXYSQL_PORT:-6033}:6033"
      - "${PROXYSQL_ADMIN_PORT:-6032}:6032"
    volumes:
      - ./infra/proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
      - proxysql_data:/var/lib/proxysql

  shardingsphere-proxy:
    image: ${SHARDINGSPHERE_PROXY_IMAGE:-docker.m.daocloud.io/apache/shardingsphere-proxy:5.4.1}
    container_name: flashsale-shardingsphere-proxy
    restart: unless-stopped
    depends_on:
      proxysql:
        condition: service_started
    ports:
      - "${SHARDINGSPHERE_PROXY_PORT:-3309}:3307"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "wget -q -O /opt/shardingsphere-proxy/ext-lib/mysql-connector-j-8.4.0.jar https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.4.0/mysql-connector-j-8.4.0.jar || wget -q -O /opt/shardingsphere-proxy/ext-lib/mysql-connector-j-8.4.0.jar https://maven.aliyun.com/repository/public/com/mysql/mysql-connector-j/8.4.0/mysql-connector-j-8.4.0.jar; exec /opt/shardingsphere-proxy/bin/start.sh"
    volumes:
      - ./infra/shardingsphere-proxy/server.yaml:/opt/shardingsphere-proxy/conf/server.yaml:ro
      - ./infra/shardingsphere-proxy/config-flashsale.yaml:/opt/shardingsphere-proxy/conf/config-flashsale.yaml:ro

  backend1:
    image: ${BACKEND_CORE_IMAGE:-flashsale/backend-core:local}
    build:
      context: ./backEnd
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:21-jre}
        MAVEN_OPTS: ${MAVEN_BUILD_OPTS:--Xms128m -Xmx512m -XX:MaxMetaspaceSize=256m}
        SERVICE_MODULE: core-service
    container_name: flashsale-backend-1
    restart: unless-stopped
    depends_on:
      nacos:
        condition: service_healthy
      nacos-config-init:
        condition: service_completed_successfully
      mysql-inventory:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: ${BACKEND_SERVER_PORT:-6005}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0}
      SPRING_DATASOURCE_URL: ${SPRING_INVENTORY_DB_URL:-jdbc:mysql://mysql-inventory:3306/${INVENTORY_DB_NAME:-FlashSale}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${INVENTORY_DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${INVENTORY_DB_PASSWORD:-root123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS: ${SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS:-false}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_ELASTICSEARCH_URIS: ${SPRING_ELASTICSEARCH_URIS:-http://elasticsearch:9200}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
    ports:
      - "${BACKEND1_HOST_PORT:-8081}:${BACKEND_SERVER_PORT:-6005}"

  backend2:
    image: ${BACKEND_CORE_IMAGE:-flashsale/backend-core:local}
    pull_policy: never
    container_name: flashsale-backend-2
    restart: unless-stopped
    depends_on:
      nacos:
        condition: service_healthy
      nacos-config-init:
        condition: service_completed_successfully
      mysql-inventory:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: ${BACKEND_SERVER_PORT:-6005}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0}
      SPRING_DATASOURCE_URL: ${SPRING_INVENTORY_DB_URL:-jdbc:mysql://mysql-inventory:3306/${INVENTORY_DB_NAME:-FlashSale}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${INVENTORY_DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${INVENTORY_DB_PASSWORD:-root123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS: ${SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS:-false}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_ELASTICSEARCH_URIS: ${SPRING_ELASTICSEARCH_URIS:-http://elasticsearch:9200}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
    ports:
      - "${BACKEND2_HOST_PORT:-8082}:${BACKEND_SERVER_PORT:-6005}"

  gateway-service:
    build:
      context: ./backEnd
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:21-jre}
        MAVEN_OPTS: ${MAVEN_BUILD_OPTS:--Xms128m -Xmx512m -XX:MaxMetaspaceSize=256m}
        SERVICE_MODULE: gateway-service
    container_name: flashsale-gateway-service
    restart: unless-stopped
    depends_on:
      nacos:
        condition: service_healthy
      nacos-config-init:
        condition: service_completed_successfully
      backend1:
        condition: service_started
      backend2:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
    environment:
      SERVER_PORT: ${GATEWAY_SERVICE_PORT:-8080}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
    ports:
      - "${GATEWAY_SERVICE_HOST_PORT:-8080}:${GATEWAY_SERVICE_PORT:-8080}"

  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
    container_name: flashsale-frontend
    restart: unless-stopped
    depends_on:
      - gateway-service
      - backend1
      - backend2
      - order-service
    ports:
      - "${FRONTEND_PORT:-80}:80"

  order-service:
    build:
      context: ./backEnd
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:21-jre}
        MAVEN_OPTS: ${MAVEN_BUILD_OPTS:--Xms128m -Xmx512m -XX:MaxMetaspaceSize=256m}
        SERVICE_MODULE: order-service
    container_name: flashsale-order-service
    restart: unless-stopped
    depends_on:
      nacos:
        condition: service_healthy
      nacos-config-init:
        condition: service_completed_successfully
      shardingsphere-proxy:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      inventory-service:
        condition: service_started
    environment:
      SERVER_PORT: ${ORDER_SERVICE_PORT:-6006}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://shardingsphere-proxy:3307/${MYSQL_DATABASE:-FlashSale}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: app_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS: ${SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS:-false}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
    ports:
      - "${ORDER_SERVICE_HOST_PORT:-8083}:${ORDER_SERVICE_PORT:-6006}"

  inventory-service:
    build:
      context: ./backEnd
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:21-jre}
        MAVEN_OPTS: ${MAVEN_BUILD_OPTS:--Xms128m -Xmx512m -XX:MaxMetaspaceSize=256m}
        SERVICE_MODULE: inventory-service
    container_name: flashsale-inventory-service
    restart: unless-stopped
    depends_on:
      nacos:
        condition: service_healthy
      nacos-config-init:
        condition: service_completed_successfully
      mysql-inventory:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: ${INVENTORY_SERVICE_PORT:-6007}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0}
      SPRING_DATASOURCE_URL: ${SPRING_INVENTORY_DB_URL:-jdbc:mysql://mysql-inventory:3306/${INVENTORY_DB_NAME:-FlashSale}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${INVENTORY_DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${INVENTORY_DB_PASSWORD:-root123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS: ${SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS:-false}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
    ports:
      - "${INVENTORY_SERVICE_HOST_PORT:-8084}:${INVENTORY_SERVICE_PORT:-6007}"

volumes:
  mysql_primary_data:
  mysql_replica_data:
  mysql_inventory_data:
  proxysql_data:
  redis_data:
